services:
  # ─────────────────────────────────────────────────────────
  # STACK ORIGINAL — N8N + Baileys (no tocar)
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sintergia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sintergia -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: sintergia
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GROQ_API_KEY: ${GROQ_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  whatsapp-bot:
    build:
      context: ./whatsapp-bot
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/lead-capture
      BOT_PORT: "3001"
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_auth:/app/auth
    depends_on:
      - n8n

  # ─────────────────────────────────────────────────────────
  # STACK NUEVO — Evolution API (paralelo a Baileys, A/B test)
  # Agregado 2026-05-19. Puerto externo: 8087.
  # Webhook a N8N: /webhook/whatsapp-evolution
  # ─────────────────────────────────────────────────────────
  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8087:8080"
    environment:
      # --- Server ---
      SERVER_URL: http://localhost:8087
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DEL_INSTANCE: "false"
      LANGUAGE: es
      # --- Database (Postgres dedicado) ---
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD}@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_sintergia
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      # --- Cache (Redis dedicado) ---
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # --- Webhook global (a N8N) ---
      WEBHOOK_GLOBAL_URL: http://n8n:5678/webhook/whatsapp-evolution
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      # --- Logs ---
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
      LOG_BAILEYS: error
      # --- QR Code ---
      QRCODE_LIMIT: "10"
      QRCODE_COLOR: "#040b16"
      # --- CORS ---
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE,PATCH"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  whatsapp_auth:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:
